# wardrive_crew — operator terminal for war-driving on the host's wireless
# interface.
#
# Default target hardware: ClockworkPi uConsole (CM5) + Hackergadgets AIO v1.
# In that configuration the AIO's wifi typically enumerates as wlan1 (the
# CM5's built-in wifi keeps wlan0 for the management connection). For other
# hardware, override WARDRIVE_IFACE.
#
# Wireless scanning requires direct access to the host's wifi adapter. We use
# host networking + NET_ADMIN/NET_RAW caps. If you need monitor mode, the
# adapter and its driver must support it (the AIO v1's chipset does).

services:
  wardrive:
    build: .
    image: wardrive_crew:latest
    container_name: wardrive_crew
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      # SYS_TIME: lets `hwclock -s` settimeofday() if the user actually
      # wants the container to write the wallclock from the AIO RTC.
      # The default rtc_loop only reads the chip, so this is optional —
      # included so it's there if needed.
      - SYS_TIME
    environment:
      # Wireless adapter on the host. Defaults to wlan1 (AIO board on a
      # uConsole, so the host's built-in wifi on wlan0 stays available for
      # the management connection). Override per-deployment.
      WARDRIVE_IFACE: ${WARDRIVE_IFACE:-wlan1}
      WARDRIVE_SCAN_INTERVAL: ${WARDRIVE_SCAN_INTERVAL:-8}
      # Set to 1 to flip into monitor mode + start pcap capture on boot.
      WARDRIVE_AUTO_MONITOR: ${WARDRIVE_AUTO_MONITOR:-0}
      # Use airmon-ng to flip into monitor mode (creates wlanXmon iface).
      # Set to 0 to use plain `iw set type monitor` instead.
      WARDRIVE_USE_AIRMON: ${WARDRIVE_USE_AIRMON:-1}
      # Run `airmon-ng check kill` first so NetworkManager / wpa_supplicant
      # stop fighting for the interface.
      WARDRIVE_KILL_INTERFERING: ${WARDRIVE_KILL_INTERFERING:-1}
      # Serve over HTTPS with a self-signed cert (required so the browser's
      # Geolocation API is allowed on a LAN IP).
      WARDRIVE_HTTPS: ${WARDRIVE_HTTPS:-1}
      WARDRIVE_PORT: ${WARDRIVE_PORT:-8443}
      WARDRIVE_LOG_LEVEL: ${WARDRIVE_LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
    restart: unless-stopped
