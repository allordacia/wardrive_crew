# uConsole + Hackergadgets AIO v1 overlay (default target).
#
# Use with the base compose file:
#
#   docker compose -f docker-compose.yml -f docker-compose.uconsole.yml up --build
#
# Defaults assume a CM5-based uConsole (GPS UART at /dev/ttyAMA0).
# For an older CM4 board override:
#   WARDRIVE_GPS_DEVICE=/dev/ttyS0
#
# The AIO board's wifi typically shows up as wlan1 (the host's built-in
# wifi keeps wlan0 for the management connection — that's the whole
# point of using two radios on this build).

services:
  wardrive:
    devices:
      - "${WARDRIVE_GPS_DEVICE:-/dev/ttyAMA0}:${WARDRIVE_GPS_DEVICE:-/dev/ttyAMA0}"
      - "/dev/gpiochip0:/dev/gpiochip0"
      # RTC (PCF85063A on the AIO board). Harmless if absent on the host.
      - "/dev/rtc0:/dev/rtc0"
    # RTL-SDR is a USB device — pass the USB bus through. (Docker compose
    # merges volume lists additively, so this adds to the base ./data
    # bind without duplicating it.) /var/run/dbus is the host BlueZ DBus
    # socket — bleak talks to bluetoothd there to drive BLE scans.
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /var/run/dbus:/var/run/dbus
    environment:
      WARDRIVE_IFACE: "${WARDRIVE_IFACE:-wlan1}"
      WARDRIVE_GPS_DEVICE: "${WARDRIVE_GPS_DEVICE:-/dev/ttyAMA0}"
      WARDRIVE_GPS_BAUD: "${WARDRIVE_GPS_BAUD:-9600}"
      # Pull hardware time from the AIO RTC at startup.
      WARDRIVE_RTC_SYNC: "${WARDRIVE_RTC_SYNC:-1}"
      # rtl_433 decodes consumer RF devices (weather stations, tire
      # sensors, doorbells, etc.). Mutually exclusive with the legacy
      # rtl_power peak counter — when both are 1, rtl_433 wins.
      WARDRIVE_RTL433_ENABLED: "${WARDRIVE_RTL433_ENABLED:-1}"
      # Legacy RTL-SDR `rtl_power` band sweep. Off by default now that
      # rtl_433 is the primary SDR consumer; flip to 1 if you actually
      # want bin-above-threshold counts instead of device decodes.
      WARDRIVE_SDR_ENABLED: "${WARDRIVE_SDR_ENABLED:-0}"
      # Passive BLE scan via the CM5 / AIO Bluetooth radio. Requires
      # bluetoothd running on the host and rfkill unblocked.
      WARDRIVE_BT_ENABLED: "${WARDRIVE_BT_ENABLED:-1}"
      WARDRIVE_BT_INTERVAL: "${WARDRIVE_BT_INTERVAL:-8}"
      WARDRIVE_BT_ADAPTER: "${WARDRIVE_BT_ADAPTER:-hci0}"
      # LoRa beacons. Empty = disabled. Set to the Meshtastic node's
      # serial path (e.g. /dev/ttyACM0) once Meshtastic firmware is
      # flashed onto the SX1262.
      WARDRIVE_LORA_DEVICE: "${WARDRIVE_LORA_DEVICE:-}"
      WARDRIVE_CREW_ID: "${WARDRIVE_CREW_ID:-}"
