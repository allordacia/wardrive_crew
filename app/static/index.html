<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>WARDRIVE CREW</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="bezel">
    <div id="brand">
      <span class="brand-mark">WARDRIVE CREW</span>
      <span class="brand-sub">LCD-77 / Game &amp; Sniff</span>
    </div>

    <div id="lcd">
      <canvas id="screen" width="640" height="360" aria-label="LCD screen"></canvas>
      <div id="lcd-overlay">
        <div class="ovr-row top">
          <span data-on="net">NET</span>
          <span data-on="pcap">PCAP</span>
          <span data-on="mon">MON</span>
          <span data-on="gps">GPS</span>
        </div>
        <div class="ovr-row bottom">
          <span data-on="lo">LO</span>
          <span data-on="mid">MID</span>
          <span data-on="hi">HI</span>
          <span data-on="warn">!!</span>
        </div>
      </div>
    </div>

    <div id="readouts">
      <div class="readout">
        <div class="label">NETWORKS</div>
        <div class="seg" id="seg-networks">000000</div>
      </div>
      <div class="readout">
        <div class="label">PACKETS</div>
        <div class="seg" id="seg-packets">00000000</div>
      </div>
      <div class="readout">
        <div class="label">MPH</div>
        <div class="seg big" id="seg-speed">000</div>
      </div>
    </div>

    <div id="controls">
      <button id="btn-monitor" class="btn">MONITOR: OFF</button>
      <button id="btn-gps" class="btn">GPS: OFF</button>
      <button id="btn-settings" class="btn">SETTINGS</button>
      <span id="status">idle</span>
    </div>
  </div>

  <div id="settings" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <span>SETTINGS</span>
        <button id="btn-close-settings" class="btn small">CLOSE</button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <div class="settings-section-head">CREW &middot; pick the vehicle &amp; cast</div>
          <div class="settings-toolbar">
            <label for="preset-select" class="lbl">PRESET</label>
            <select id="preset-select"></select>
            <span id="preset-info" class="muted"></span>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-head">WHITELIST &middot; tick networks to exclude from score</div>
          <div class="settings-toolbar">
            <input id="filter" placeholder="filter ssid / bssid…" />
            <span id="wl-count">0 whitelisted</span>
            <button id="btn-refresh" class="btn small">REFRESH</button>
            <button id="btn-save-wl" class="btn small primary">SAVE</button>
          </div>
          <div class="net-list-wrap">
            <table class="net-list">
              <thead>
                <tr><th>WL</th><th>SSID</th><th>BSSID</th><th>CH</th><th>SIG</th><th>ENC</th><th>SEEN</th></tr>
              </thead>
              <tbody id="net-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/game.js"></script>
</body>
</html>
